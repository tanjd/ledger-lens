name: Release & Push

on:
  # Automatically after CI passes on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

# Default to read-only permissions
permissions:
  contents: read

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # For workflow_run: only when CI succeeded and this isn't already a release commit.
    # For workflow_dispatch: always run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, 'chore(release)'))

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      # When triggered by workflow_run, pin to the exact SHA that CI tested.
      - name: Force branch to workflow sha
        if: github.event_name == 'workflow_run'
        run: git reset --hard ${{ github.event.workflow_run.head_sha }}

      - name: Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GHA_TRIGGER_TOKEN }}
          git_committer_name: "tanjd"
          git_committer_email: "42729752+tanjd@users.noreply.github.com"
          ssh_private_signing_key: ${{ secrets.SSH_PRIVATE_SIGNING_KEY }}
          ssh_public_signing_key: ${{ secrets.SSH_PUBLIC_SIGNING_KEY }}
          changelog: true
          vcs_release: true

      - name: Sync frontend version
        if: steps.release.outputs.released == 'true'
        env:
          SSH_PRIVATE_SIGNING_KEY: ${{ secrets.SSH_PRIVATE_SIGNING_KEY }}
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          VERSION="${VERSION#v}"
          cd frontend && npm version --no-git-tag-version "$VERSION" && cd ..
          git add frontend/package.json

          # Set up SSH commit signing with the same key used by semantic-release
          KEY_FILE=$(mktemp)
          printf '%s\n' "$SSH_PRIVATE_SIGNING_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          git config gpg.format ssh
          git config user.signingkey "$KEY_FILE"
          git config user.name "tanjd"
          git config user.email "42729752+tanjd@users.noreply.github.com"

          git commit -S -m "chore: sync frontend version to $VERSION [skip ci]"
          git push
          rm -f "$KEY_FILE"

    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::DOCKERHUB_TOKEN is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ needs.release.outputs.tag }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set image metadata
        id: meta
        run: |
          VERSION="${{ needs.release.outputs.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          BACKEND_PROJECT="${{ secrets.DOCKERHUB_PROJECT_NAME_BACKEND }}"
          [ -z "$BACKEND_PROJECT" ] && BACKEND_PROJECT="ledger-lens-backend"
          echo "backend_image=${{ secrets.DOCKER_USERNAME }}/$BACKEND_PROJECT" >> "$GITHUB_OUTPUT"

          FRONTEND_PROJECT="${{ secrets.DOCKERHUB_PROJECT_NAME }}"
          [ -z "$FRONTEND_PROJECT" ] && FRONTEND_PROJECT="ledger-lens"
          echo "frontend_image=${{ secrets.DOCKER_USERNAME }}/$FRONTEND_PROJECT" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:latest
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
