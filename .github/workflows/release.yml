name: Release & Push

on:
  # Automatically after CI passes on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

# Default to read-only permissions
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Verify both Docker images build successfully.
  # Semantic release only runs if this passes, ensuring we never tag a release
  # that produces broken images.  Layers are cached in GHA cache for reuse by
  # the push job.
  # ---------------------------------------------------------------------------
  build-check:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # For workflow_run: only when CI succeeded and this isn't already a release commit.
    # For workflow_dispatch: always run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, 'chore(release)'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      # When triggered by workflow_run, pin to the exact SHA that CI tested.
      - name: Force branch to workflow sha
        if: github.event_name == 'workflow_run'
        run: git reset --hard ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (verify — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend (verify — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ---------------------------------------------------------------------------
  # Job 2: Bump version, write changelog, create GitHub release + tag.
  # Blocked on build-check succeeding.
  # ---------------------------------------------------------------------------
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-check

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Force branch to workflow sha
        if: github.event_name == 'workflow_run'
        run: git reset --hard ${{ github.event.workflow_run.head_sha }}

      - name: Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GHA_TRIGGER_TOKEN }}
          git_committer_name: "tanjd"
          git_committer_email: "42729752+tanjd@users.noreply.github.com"
          ssh_private_signing_key: ${{ secrets.SSH_PRIVATE_SIGNING_KEY }}
          ssh_public_signing_key: ${{ secrets.SSH_PUBLIC_SIGNING_KEY }}
          changelog: true
          vcs_release: true

    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}

  # ---------------------------------------------------------------------------
  # Job 3: Build images at the release tag and push to Docker Hub.
  # GHA layer cache from build-check means only version-file layers rebuild;
  # all heavy dependency layers are served from cache.
  # ---------------------------------------------------------------------------
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::DOCKERHUB_TOKEN is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: meta
        run: |
          VERSION="${{ needs.release.outputs.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          BACKEND_PROJECT="${{ secrets.DOCKERHUB_PROJECT_NAME_BACKEND }}"
          [ -z "$BACKEND_PROJECT" ] && BACKEND_PROJECT="ledger-lens-backend"
          echo "backend_image=${{ secrets.DOCKER_USERNAME }}/$BACKEND_PROJECT" >> "$GITHUB_OUTPUT"

          FRONTEND_PROJECT="${{ secrets.DOCKERHUB_PROJECT_NAME }}"
          [ -z "$FRONTEND_PROJECT" ] && FRONTEND_PROJECT="ledger-lens"
          echo "frontend_image=${{ secrets.DOCKER_USERNAME }}/$FRONTEND_PROJECT" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:latest
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
