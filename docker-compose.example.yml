services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ledger-lens-backend:latest
    container_name: ledger-lens-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite DB and uploaded CSV files
      - ./data:/app/data
    environment:
      - ENV=prd
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ledger-lens-frontend:latest
    container_name: ledger-lens-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 400 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Usage:
# 1. Copy this file to docker-compose.yml
# 2. Copy .env.example to .env and fill in any values
# 3. Run: docker compose up -d
# 4. Open: http://localhost:3000
# 5. View logs: docker compose logs -f
# 6. Stop: docker compose down
