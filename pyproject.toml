# Root-level pyproject.toml — only used by python-semantic-release.
# Python project config lives in backend/pyproject.toml.

[tool.semantic_release]
version_toml = ["backend/pyproject.toml:project.version"]
branch = "main"
build_command = "echo 'No build needed'"
commit_message = "chore(release): {version}\n\nAutomatically generated by python-semantic-release"
commit_author = "tanjd <42729752+tanjd@users.noreply.github.com>"
tag_format = "v{version}"

[tool.semantic_release.remote]
name = "origin"
type = "github"

[tool.semantic_release.changelog]
exclude_commit_patterns = []

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.branches.main]
match = "main"
prerelease = false
